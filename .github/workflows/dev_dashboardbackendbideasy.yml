# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - dashboardbackendbideasy

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: bideasy.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_7D28B653075E48D185289886A323E5FA }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_86F3E5EF87F44A76B43AD5C771E33D28 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: bideasy.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_7D28B653075E48D185289886A323E5FA }}/bideasydashboardbackendcontainer:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    

    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_937DCEAC6D6C4B399AD1B1C430D1E458 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1BE58C850D1E4F4E826CCD87823AA0D9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5484451E6EB34CA0AE51D264594296C9 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'dashboardbackendbideasy'
          slot-name: 'Production'
          images: 'bideasy.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_7D28B653075E48D185289886A323E5FA }}/bideasydashboardbackendcontainer:${{ github.sha }}'
          